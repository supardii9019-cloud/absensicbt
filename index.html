});
clearTimeout(timer);
if (!res.ok) { const err = await res.text(); return { data: null, error: err }; }
const data = await res.json();
return { data, error: null };

// ── CACHE LAYER ─────────────────────────────────────────────────
const _cache = {};
const _pendingReq = {};
async function cachedFetch(key, fn, ttl = 60000) {
const now = Date.now();
if (_cache[key] && (now - _cache[key].ts) < ttl) {
return _cache[key].data;
}
if (_pendingReq[key]) {
return _pendingReq[key];
}
_pendingReq[key] = fn().then(data => {
_cache[key] = { data, ts: Date.now() };
delete _pendingReq[key];
return data;
}).catch(e => {
delete _pendingReq[key];
throw e;
});
return _pendingReq[key];
}
function invalidateCache(...keys) {
keys.forEach(k => { delete _cache[k]; delete _pendingReq[k]; });
}

// ============================================================
// IMPORT SISWA DARI EXCEL
// ============================================================
const importStudentsExcel = (file, existingStudents, onImport) => {
if(!window.XLSX){alert('Library Excel belum siap.');return;}
const XLSX = window.XLSX;
const reader = new FileReader();
reader.onload = async (e) => {
try {
const wb = XLSX.read(e.target.result, {type:'binary'});
const isNum = s => /^\d+$/.test(String(s).trim());
const ci = (hdr,ns) => { for(const n of ns){ const x=hdr.findIndex(h=>h.includes(n)); if(x>=0)return x; } return -1; };
const collected = [];
let validSheet = false;
for(const shName of wb.SheetNames){
const ws = wb.Sheets[shName];
const rows = XLSX.utils.sheet_to_json(ws, {header:1});
if(!rows||rows.length<2) continue;
const hdr = (rows[0]||[]).map(h=>String(h||'').toLowerCase().trim());
const iCode=ci(hdr,['kode']), iName=ci(hdr,['nama']);
if(iCode<0||iName<0) continue;
validSheet = true;
const iPass=ci(hdr,['password','pass','sandi']);
const iKelas=ci(hdr,['kelas']), iNis=ci(hdr,['nis']), iPhone=ci(hdr,['hp','phone','telepon','wa']);
for(let r=1;r<rows.length;r++){
const row=rows[r];
if(!row||!row.length) continue;
const code=String(row[iCode]!=null?row[iCode]:'').trim();
const name=String(row[iName]!=null?row[iName]:'').trim();
if(!code||!name||isNum(code)) continue;
if(name.toLowerCase().includes('contoh')||code.toLowerCase()==='kode siswa') continue;
const pass=iPass>=0&&row[iPass]!=null?String(row[iPass]).trim():'123456';
const kelas=iKelas>=0&&row[iKelas]!=null?String(row[iKelas]).trim():'';
const nis=iNis>=0&&row[iNis]!=null?String(row[iNis]).trim():'';
const phone=iPhone>=0&&row[iPhone]!=null?String(row[iPhone]).trim():'';
collected.push({code,name,pass,kelas,nis,phone});
}
}
if(!validSheet){alert('Sheet dengan kolom Kode Siswa & Nama tidak ditemukan.');return;}
const newStudents=[], errors=[];
for(const d of collected){
if(newStudents.some(s=>s.studentCode.toLowerCase()===d.code.toLowerCase())||existingStudents.some(s=>s.studentCode.toLowerCase()===d.code.toLowerCase())){
errors.push('ID '+d.code+' sudah ada, dilewati'); continue;
}
newStudents.push({id:uid(),studentCode:d.code,name:d.name,password:d.pass,kelas:d.kelas,nis:d.nis,phone:d.phone,active:true,createdAt:new Date().toISOString()});
}
if(!newStudents.length){alert('Tidak ada data baru.\n'+(errors.length?errors.slice(0,5).join('\n'):'Semua ID sudah terdaftar.'));return;}
const konfirm=confirm(newStudents.length+' siswa akan diimport.'+(errors.length?'\nDilewati: '+errors.length+' baris (ID duplikat)':'')+'\nLanjutkan?');
if(!konfirm) return;
onImport(newStudents, errors);
} catch(err) {
alert('Gagal baca file: '+err.message);
}
};
reader.readAsBinaryString(file);
};

// EXPORT PDF ABSENSI (harian/mingguan/bulanan/tahunan + foto)
// ============================================================
const exportPDF = async (records, students, settings, mode, filterKelas) => {
if(!window.jspdf){alert('Library PDF belum siap, coba lagi.');return;}
const { jsPDF } = window.jspdf;
const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
const W = 210, H = 297;
const margin = 14;
const colW = [12, 18, 48, 22, 22, 18, 22]; // No,Tanggal,Nama,Masuk,Status,Pulang,Kelas
const colX = colW.reduce((acc,w,i)=>{ acc.push(i===0?margin:(acc[i-1]||margin)+colW[i-1]); return acc; },[]);
// Judul periode
const now = new Date();
let periodeLabel = '';
let filteredRec = [...records];
if(filterKelas) filteredRec = filteredRec.filter(r=>{ const s=students.find(x=>x.id===r.studentId); return s&&s.kelas===filterKelas; });
if(mode==='daily'){
periodeLabel = 'Harian - '+now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
filteredRec = filteredRec.filter(r=>r.date===todayStr());
} else if(mode==='weekly'){
const startOfWeek = new Date(now); startOfWeek.setDate(now.getDate()-now.getDay()+1);
const endOfWeek = new Date(startOfWeek); endOfWeek.setDate(startOfWeek.getDate()+6);
const s = startOfWeek.toISOString().split('T')[0];
const e = endOfWeek.toISOString().split('T')[0];
filteredRec = filteredRec.filter(r=>r.date>=s&&r.date<=e);
periodeLabel = 'Mingguan - '+startOfWeek.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' s/d '+endOfWeek.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'});
} else if(mode==='monthly'){
const mm = String(now.getMonth()+1).padStart(2,'0');
const yy = now.getFullYear();
filteredRec = filteredRec.filter(r=>r.date.startsWith(yy+'-'+mm));
periodeLabel = 'Bulanan - '+now.toLocaleDateString('id-ID',{month:'long',year:'numeric'});
} else if(mode==='yearly'){
const yy = now.getFullYear();
filteredRec = filteredRec.filter(r=>r.date.startsWith(yy+''));
periodeLabel = 'Tahunan - '+yy;
}
filteredRec.sort((a,b)=>a.date.localeCompare(b.date)||a.studentName.localeCompare(b.studentName));
// Kelompokkan per tanggal jika bukan harian
const groupByDate = {};
filteredRec.forEach(r=>{ if(!groupByDate[r.date]) groupByDate[r.date]=[]; groupByDate[r.date].push(r); });
let pageNum = 1;
let yPos = 0;
const addHeader = (isFirstPage) => {
// Background header
doc.setFillColor(10,10,26);
doc.rect(0,0,W,36,'F');
doc.setFillColor(0,240,255);
doc.rect(0,34,W,1,'F');
doc.setTextColor(0,240,255);
doc.setFontSize(18);
doc.setFont('helvetica','bold');
doc.text('ABSENSI', margin, 14);
doc.setTextColor(168,85,247);
doc.text('KU', margin+32, 14);
doc.setTextColor(200,200,200);
doc.setFontSize(8);
doc.setFont('helvetica','normal');
doc.text(settings.schoolName||'AbsensiKu', margin, 20);
doc.text('Laporan Absensi Siswa', margin, 25);
doc.text(periodeLabel, margin, 30);
if(filterKelas) doc.text('Kelas: '+filterKelas, W-margin-45, 20);
doc.text('Dicetak: '+now.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0'), W-margin-60, 30);
// Statistik ringkas di kanan
const hadir = filteredRec.filter(r=>r.clockIn).length;
const telat = filteredRec.filter(r=>r.clockIn&&isLate(r.clockIn,settings.schoolStart)).length;
doc.setTextColor(0,255,136);
doc.setFontSize(7);
doc.text('Total: '+filteredRec.length+' | Hadir: '+hadir+' | Telat: '+telat, W-margin-60, 25);
yPos = 40;
};
const addTableHeader = () => {
doc.setFillColor(20,20,40);
doc.rect(margin-1, yPos-3, W-margin*2+2, 7, 'F');
doc.setTextColor(0,240,255);
doc.setFontSize(7);
doc.setFont('helvetica','bold');
const headers = ['No','Tanggal','Nama Siswa','Masuk','Status','Pulang','Kelas'];
headers.forEach((h,i)=>doc.text(h, colX[i], yPos+2));
doc.setDrawColor(0,240,255);
doc.setLineWidth(0.3);
doc.line(margin-1, yPos+4, W-margin+1, yPos+4);
yPos += 7;
};
const checkNewPage = (neededH) => {
if(yPos + neededH > H - 16) {
// Footer
doc.setTextColor(100,100,120);
doc.setFontSize(6);
doc.text('Halaman '+pageNum+' - AbsensiKu | '+settings.schoolName, margin, H-6);
doc.addPage();
pageNum++;
addHeader(false);
addTableHeader();
}
};
addHeader(true);
addTableHeader();
let no = 1;
let hasPhoto = false;
const photoRows = []; // kumpulkan foto untuk halaman terpisah
for(const r of filteredRec){
const s = students.find(x=>x.id===r.studentId);
const status = r.clockIn ? (isLate(r.clockIn,settings.schoolStart)?'Terlambat':'Tepat Waktu') : '-';
const rowH = 7;
checkNewPage(rowH + 2);
// Zebra stripe
if(no%2===0){ doc.setFillColor(15,15,30); doc.rect(margin-1,yPos-3,W-margin*2+2,rowH,'F'); }
doc.setFont('helvetica','normal');
doc.setFontSize(7);
doc.setTextColor(220,220,220);
doc.text(String(no), colX[0], yPos+2);
doc.text(r.date||'-', colX[1], yPos+2);
const namaLen = r.studentName||'-';
doc.text(namaLen.length>22?namaLen.slice(0,22)+'...':namaLen, colX[2], yPos+2);
doc.setTextColor(0,240,255);
doc.text(r.clockIn||'-', colX[3], yPos+2);
if(status==='Terlambat') doc.setTextColor(251,146,60);
else if(status==='Tepat Waktu') doc.setTextColor(0,255,136);
else doc.setTextColor(150,150,150);
doc.text(status, colX[4], yPos+2);
doc.setTextColor(168,85,247);
doc.text(r.clockOut||'-', colX[5], yPos+2);
doc.setTextColor(180,180,200);
const kl = (s&&s.kelas||'-');
doc.text(kl.length>12?kl.slice(0,12)+'..':kl, colX[6], yPos+2);
// Garis pemisah tipis
doc.setDrawColor(30,30,60);
doc.setLineWidth(0.1);
doc.line(margin-1, yPos+4, W-margin+1, yPos+4);
yPos += rowH;
// Kumpulkan foto jika ada
if(r.clockInPhoto||r.clockOutPhoto){
photoRows.push({r, s, no});
hasPhoto = true;
}
no++;
}
// Footer halaman terakhir tabel
doc.setTextColor(100,100,120);
doc.setFontSize(6);
doc.text('Halaman '+pageNum+' - AbsensiKu | '+settings.schoolName, margin, H-6);
// ====== HALAMAN FOTO ======
if(hasPhoto){
for(const {r, s, no: rowNo} of photoRows){
doc.addPage();
pageNum++;
// Mini header
doc.setFillColor(10,10,26);
doc.rect(0,0,W,22,'F');
doc.setTextColor(0,240,255);
doc.setFontSize(10);
doc.setFont('helvetica','bold');
doc.text('Foto Absensi - '+r.studentName, margin, 10);
doc.setTextColor(180,180,200);
doc.setFontSize(7);
doc.setFont('helvetica','normal');
doc.text(r.date+' | '+(s&&s.kelas||'-')+' | '+r.studentCode, margin, 16);
doc.text('Halaman '+pageNum, W-margin-20, 16);
yPos = 28;
const photoW = 85, photoH = 65;
const positions = [{label:'📷 Foto Masuk', photo:r.clockInPhoto, time:r.clockIn, x:margin},
{label:'📷 Foto Pulang', photo:r.clockOutPhoto, time:r.clockOut, x:margin+photoW+8}];
for(const p of positions){
if(!p.photo) continue;
doc.setTextColor(0,240,255);
doc.setFontSize(8);
doc.text(p.label+' ('+(p.time||'-')+')', p.x, yPos);
try {
doc.addImage(p.photo, 'JPEG', p.x, yPos+4, photoW, photoH);
} catch(e) {
doc.setFillColor(20,20,40);
doc.rect(p.x, yPos+4, photoW, photoH, 'F');
doc.setTextColor(100,100,120);
doc.setFontSize(8);
doc.text('Foto tidak tersedia', p.x+photoW/2-20, yPos+4+photoH/2);

}
yPos += photoH + 12;
// Info siswa
doc.setFillColor(15,15,30);
doc.rect(margin, yPos, W-margin*2, 28, 'F');
doc.setTextColor(0,240,255);
doc.setFontSize(7);
doc.setFont('helvetica','bold');
doc.text('INFORMASI ABSENSI', margin+4, yPos+6);

const infos = [
'Nama: '+r.studentName,

setLoading(true);setError('');

const loginGuru=async()=>{
// Cek akun demo
if(guruUser==='demo.wali'&&guruPass==='demo123'){
onLogin({role:'wali',teacher:DEMO_WALI,isDemo:true});return;
}

const loginStudent = async () => {
if(stuCode.toUpperCase()==='DEMO01' && stuPass==='demo123'){
onLogin({role:'student',student:DEMO_STUDENT,isDemo:true}); return;
}
setLoading(true); setError('');
try {
const [students, sv] = await Promise.all([
DB.getStudents(),
DB.getSettings()
]);
const stu = students.find(s =>
(s.nis && s.nis.toLowerCase()===stuCode.toLowerCase() ||
s.studentCode.toLowerCase()===stuCode.toLowerCase()) &&
s.password===stuPass && s.active
);
if(!stu){ setError('NIS atau password salah'); setLoading(false); return; }
if(sv.deviceLock){
const ownerOther = students.find(s=>s.id!==stu.id&&s.deviceId&&s.deviceId===devInfo.id);
if(ownerOther){
setError('Perangkat ini sudah terdaftar atas nama: '+ownerOther.name+'\nSatu perangkat hanya untuk 1 akun siswa.');
await DB.addLog(stu.name,'Login Ditolak','Device milik '+ownerOther.name);
setLoading(false); return;
}
if(stu.deviceId && stu.deviceId!==devInfo.id){
setError('Akun ini sudah terdaftar di perangkat lain.\nTerdaftar: '+(stu.deviceInfo&&stu.deviceInfo.name||stu.deviceId)+'\nHubungi admin untuk reset perangkat.');
await DB.addLog(stu.name,'Login Ditolak','Device mismatch');
setLoading(false); return;
}
}
if(!stu.deviceId){
await DB.updateStudentDevice(stu.id, devInfo.id, devInfo);
stu.deviceId=devInfo.id; stu.deviceInfo=devInfo;
}
await DB.addLog(stu.name,'Login',stu.studentCode);
onLogin({role:'student',student:stu});
} catch(e){ setError('Koneksi gagal. Coba lagi dalam beberapa detik.'); }
setLoading(false);
};

          h('div',null,h('h1',{style:{fontFamily:ORB,fontSize:'14px',fontWeight:'bold',color:'var(--text-primary)',letterSpacing:'0.1em'}},'ABSENSI',h('span',{style:{color:'#a855f7'}},'KU')),h('p',{style:{fontSize:'8px',fontFamily:MONO,color:isSuperAdmin?'rgba(0,240,255,.6)':'rgba(168,85,247,.6)',letterSpacing:'0.3em'}},isSuperAdmin?'\uD83D\uDEE1\uFE0F SUPERADMIN':'\uD83D\uDC64 ADMIN'+(adminData?' — '+adminData.name:'')))
        ),
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px'}},
          h(NotifBell,{targetId:'admin'}),
          h('button',{onClick:()=>setShowTheme(true),style:{color:'var(--accent)',background:'var(--accent-bg)',border:'1px solid var(--accent-dim)',borderRadius:'8px',padding:'6px 8px',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}},h(Icon,{n:'theme',s:16,c:'currentColor'})),
          h('button',{onClick:async()=>{await DB.addLog('Admin','Logout','');onLogout();},style:{color:'var(--text-muted)',background:'none',border:'none',cursor:'pointer',fontSize:'12px',fontFamily:MONO,display:'flex',alignItems:'center',gap:'5px'}},h(Icon,{n:'logout',s:14,c:'currentColor'}),'Keluar')
        )
      )
    ),
    h('main',{className:'mobile-content-main',style:{position:'relative',zIndex:10,maxWidth:'640px',margin:'0 auto',padding:'24px 16px 112px'}},
      page==='dashboard'&&h(AdminDashboard,{students,records,settings,leaves}),
      page==='students'&&h(AdminStudents,{onBack:()=>setPage('dashboard'),students,onReload:reload,settings}),
      page==='attendance'&&h(AdminAttendance,{onBack:()=>setPage('dashboard'),records,students,settings}),
      page==='leaves'&&h(AdminLeaves,{onBack:()=>setPage('dashboard'),leaves,onReload:reload}),
      page==='announcements'&&h(AdminAnnouncements,{onBack:()=>setPage('dashboard'),announcements:anns,onReload:reload,students}),
      page==='devices'&&h(AdminDevices,{onBack:()=>setPage('dashboard'),students,onReload:reload}),
      page==='location'&&h(AdminLocation,{onBack:()=>setPage('dashboard'),settings,onSave:saveSettings}),
      page==='qrscan'&&h(AdminQRScanner,{onBack:()=>setPage('dashboard'),students,records,settings,onReload:reload}),
      page==='wa'&&h(AdminWA,{onBack:()=>setPage('dashboard'),students,records,settings,onReload:reload}),
      page==='teachers'&&h(AdminTeachers,{onBack:()=>setPage('dashboard'),onReload:reload}),
      page==='cbt'&&h(AdminCBT,{onBack:()=>setPage('dashboard'),students,settings,isSuperAdmin}),
      page==='rekap'&&h(AdminRekapBulanan,{onBack:()=>setPage('dashboard'),records,students,settings,holidays}),
      page==='holidays'&&h(AdminHolidays,{onBack:()=>setPage('dashboard'),holidays,onReload:reload}),
      page==='schedule'&&h(AdminSchedule,{onBack:()=>setPage('dashboard'),settings,onSave:saveSettings}),
      page==='multiadmin'&&(isSuperAdmin?h(AdminMultiAdmin,{onBack:()=>setPage('dashboard'),onReload:reload}):h(AccessDenied,{msg:'Kelola Admin'})),
      page==='backup'&&(isSuperAdmin?h(AdminBackup,{onBack:()=>setPage('dashboard'),students,records,leaves,announcements:anns,settings}):h(AccessDenied,{msg:'Backup & Restore'})),
      page==='activity'&&h(AdminActivityLog,{onBack:()=>setPage('dashboard')}),
      page==='settings'&&(isSuperAdmin?h(AdminSettings,{onBack:()=>setPage('dashboard'),settings,onSave:saveSettings}):h(AccessDenied,{msg:'Pengaturan Sekolah'})),
      page==='password'&&(isSuperAdmin?h(AdminPasswordManager,{onBack:()=>setPage('dashboard'),students,adminData}):h(AccessDenied,{msg:'Reset Password'})),
      page==='settings'&&isSuperAdmin&&h('div',{style:Object.assign({},gl,{borderRadius:'16px',padding:'20px',border:'1px solid rgba(239,68,68,.15)',marginTop:'20px'})},h('p',{style:{fontFamily:ORB,fontSize:'12px',color:'rgba(248,113,113,.7)',letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:'12px'}},'Danger Zone'),h('button',{onClick:clearRecords,style:{width:'100%',padding:'12px',borderRadius:'12px',fontSize:'12px',fontFamily:MONO,color:'#f87171',border:'1px solid rgba(239,68,68,.3)',background:'rgba(239,68,68,.05)',cursor:'pointer'}},'Hapus Semua Absensi'))
    ),
    h(NavBar,{items:nav,active:page,onSelect:setPage}),
    showTheme&&h(ThemePicker,{onClose:()=>setShowTheme(false)})
  );
}
</script>
